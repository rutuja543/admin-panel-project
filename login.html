<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet" />
</head>
<body class="login-page d-flex align-items-center justify-content-center min-vh-100">

<div class="login-card card shadow-lg border-0 p-4" style="width: 400px;">
    <div class="text-center mb-4">
        <div class="login-icon mb-3">
            <i class="fa fa-shield-halved fa-3x text-primary"></i>
        </div>
        <h3 class="fw-bold">Admin Panel</h3>
        <p class="text-muted small">Sign in to access the dashboard</p>
    </div>

    <!-- Flash messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }} alert-dismissible fade show py-2" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('auth.login') }}">
        <div class="mb-3">
            <label for="username" class="form-label fw-semibold">Username</label>
            <div class="input-group">
                <span class="input-group-text bg-light">
                    <i class="fa fa-user text-muted"></i>
                </span>
                <input type="text" class="form-control" id="username" name="username"
                       placeholder="Enter username" required autofocus />
            </div>
        </div>

        <div class="mb-4">
            <label for="password" class="form-label fw-semibold">Password</label>
            <div class="input-group">
                <span class="input-group-text bg-light">
                    <i class="fa fa-lock text-muted"></i>
                </span>
                <input type="password" class="form-control" id="password" name="password"
                       placeholder="Enter password" required />
            </div>
        </div>

        <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
            <i class="fa fa-right-to-bracket me-2"></i>Sign In
        </button>
    </form>

    <div class="text-center mt-4">
        <small class="text-muted">
            <i class="fa fa-circle-info me-1"></i>
            Default credentials: <code>admin</code> / <code>admin123</code>
        </small>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
